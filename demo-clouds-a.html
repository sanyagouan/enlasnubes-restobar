<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Las Nubes — Opción A: Cielo Onírico</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #0d0806;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(
                180deg,
                #0a0605 0%,
                #1a0f0a 15%,
                #2C1810 30%,
                #3D2519 50%,
                #4A3228 70%,
                #5C4033 85%,
                #6B5040 100%
            );
        }

        /* ========== STARS ========== */
        .stars {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ========== CLOUDS - Pure CSS volumetric ========== */
        .clouds-container {
            position: absolute;
            inset: 0;
            z-index: 5;
            overflow: hidden;
        }

        .cloud-layer {
            position: absolute;
            width: 200%;
            left: -50%;
        }

        /* Each cloud is a group of overlapping circles */
        .css-cloud {
            position: absolute;
            filter: drop-shadow(0 8px 32px rgba(0,0,0,0.3));
        }

        .css-cloud .puff {
            position: absolute;
            border-radius: 50%;
        }

        /* CLOUD 1 - Large fluffy, top left */
        .cloud-1 {
            top: 5%;
            left: 5%;
            animation: driftRight 35s ease-in-out infinite;
        }
        .cloud-1 .puff:nth-child(1) {
            width: 200px; height: 120px;
            background: linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(255,245,230,0.2) 60%, transparent 100%);
            border-radius: 60% 40% 50% 50%;
            left: 0; top: 30px;
        }
        .cloud-1 .puff:nth-child(2) {
            width: 250px; height: 150px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,240,220,0.15) 70%, transparent 100%);
            border-radius: 50% 50% 45% 55%;
            left: 60px; top: -20px;
        }
        .cloud-1 .puff:nth-child(3) {
            width: 180px; height: 130px;
            background: linear-gradient(225deg, rgba(255,255,255,0.3) 0%, rgba(255,250,240,0.1) 80%, transparent 100%);
            border-radius: 45% 55% 50% 50%;
            left: 180px; top: 10px;
        }
        .cloud-1 .puff:nth-child(4) {
            width: 160px; height: 100px;
            background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 100%);
            border-radius: 50%;
            left: 280px; top: 40px;
        }
        .cloud-1 .puff:nth-child(5) {
            width: 300px; height: 80px;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            border-radius: 40% 60% 50% 50%;
            left: -20px; top: 80px;
        }

        /* CLOUD 2 - Medium, center-right */
        .cloud-2 {
            top: 12%;
            left: 55%;
            animation: driftLeft 40s ease-in-out infinite;
        }
        .cloud-2 .puff:nth-child(1) {
            width: 180px; height: 100px;
            background: linear-gradient(135deg, rgba(201,169,110,0.3) 0%, rgba(201,169,110,0.1) 70%, transparent 100%);
            border-radius: 50% 50% 45% 55%;
            left: 0; top: 20px;
        }
        .cloud-2 .puff:nth-child(2) {
            width: 220px; height: 140px;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(201,169,110,0.15) 60%, transparent 100%);
            border-radius: 55% 45% 50% 50%;
            left: 50px; top: -30px;
        }
        .cloud-2 .puff:nth-child(3) {
            width: 200px; height: 120px;
            background: linear-gradient(225deg, rgba(255,255,255,0.25) 0%, transparent 80%);
            border-radius: 50% 50% 55% 45%;
            left: 160px; top: 0px;
        }
        .cloud-2 .puff:nth-child(4) {
            width: 260px; height: 70px;
            background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
            border-radius: 50%;
            left: -10px; top: 70px;
        }

        /* CLOUD 3 - Small wispy, far background */
        .cloud-3 {
            top: 20%;
            left: 30%;
            opacity: 0.5;
            animation: driftRight 50s ease-in-out infinite;
        }
        .cloud-3 .puff:nth-child(1) {
            width: 350px; height: 60px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 30%, rgba(255,255,255,0.15) 70%, transparent 100%);
            border-radius: 50%;
        }
        .cloud-3 .puff:nth-child(2) {
            width: 250px; height: 50px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 40%, transparent 100%);
            border-radius: 50%;
            left: 60px; top: -15px;
        }

        /* CLOUD 4 - Golden accent cloud */
        .cloud-4 {
            top: 25%;
            left: 75%;
            animation: driftLeft 30s ease-in-out infinite;
        }
        .cloud-4 .puff:nth-child(1) {
            width: 150px; height: 90px;
            background: linear-gradient(135deg, rgba(201,169,110,0.35) 0%, rgba(201,169,110,0.1) 80%, transparent 100%);
            border-radius: 50%;
        }
        .cloud-4 .puff:nth-child(2) {
            width: 180px; height: 110px;
            background: linear-gradient(180deg, rgba(201,169,110,0.3) 0%, rgba(196,112,75,0.1) 60%, transparent 100%);
            border-radius: 50% 50% 45% 55%;
            left: 60px; top: -30px;
        }
        .cloud-4 .puff:nth-child(3) {
            width: 120px; height: 80px;
            background: linear-gradient(225deg, rgba(201,169,110,0.2) 0%, transparent 100%);
            border-radius: 50%;
            left: 160px; top: 10px;
        }

        /* CLOUD 5 - Bottom large sweeping cloud */
        .cloud-5 {
            top: 55%;
            left: -5%;
            animation: driftRight 45s ease-in-out infinite;
        }
        .cloud-5 .puff:nth-child(1) {
            width: 500px; height: 120px;
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,240,220,0.05) 70%, transparent 100%);
            border-radius: 50% 50% 40% 60%;
        }
        .cloud-5 .puff:nth-child(2) {
            width: 350px; height: 140px;
            background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 80%);
            border-radius: 50%;
            left: 100px; top: -50px;
        }
        .cloud-5 .puff:nth-child(3) {
            width: 400px; height: 100px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            border-radius: 50%;
            left: 200px; top: 30px;
        }

        /* GROUND FOG */
        .ground-fog {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 250px;
            z-index: 6;
            background:
                radial-gradient(ellipse 80% 50% at 20% 100%, rgba(255,255,255,0.25) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,245,230,0.2) 0%, transparent 65%),
                radial-gradient(ellipse 70% 50% at 80% 100%, rgba(201,169,110,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 100% 60% at 50% 100%, rgba(255,255,255,0.12) 0%, transparent 80%);
            animation: fogPulse 8s ease-in-out infinite;
        }
        .ground-fog::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top,
                rgba(92,64,51,0.8) 0%,
                rgba(92,64,51,0.3) 40%,
                transparent 100%
            );
        }

        @keyframes driftRight {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(80px) translateY(-15px); }
        }
        @keyframes driftLeft {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-60px) translateY(10px); }
        }
        @keyframes fogPulse {
            0%, 100% { opacity: 0.8; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); }
        }

        /* ========== LIGHT RAYS ========== */
        .light-rays {
            position: absolute;
            top: 0;
            left: 30%;
            width: 40%;
            height: 100%;
            z-index: 3;
            background: linear-gradient(
                180deg,
                rgba(201,169,110,0.06) 0%,
                rgba(201,169,110,0.03) 30%,
                transparent 70%
            );
            clip-path: polygon(35% 0%, 65% 0%, 90% 100%, 10% 100%);
            animation: raysShift 12s ease-in-out infinite;
        }
        @keyframes raysShift {
            0%, 100% { opacity: 0.5; transform: scaleX(1); }
            50% { opacity: 0.8; transform: scaleX(1.2); }
        }

        /* ========== MOON / GLOW ========== */
        .moon-glow {
            position: absolute;
            top: 5%;
            right: 15%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255,250,240,0.15) 0%,
                rgba(201,169,110,0.08) 30%,
                transparent 70%
            );
            z-index: 2;
            animation: moonPulse 6s ease-in-out infinite;
        }
        @keyframes moonPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ========== CONTENT ========== */
        .hero-content {
            position: relative;
            z-index: 20;
            text-align: center;
            padding: 0 24px;
            max-width: 800px;
        }
        .hero-badge {
            display: inline-block;
            padding: 8px 24px;
            border: 1px solid rgba(201,169,110,0.4);
            border-radius: 50px;
            color: #C9A96E;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 28px;
            background: rgba(201,169,110,0.08);
            backdrop-filter: blur(4px);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            color: #FEFCF9;
            margin-bottom: 16px;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        h1 em {
            color: #C9A96E;
            font-style: italic;
        }
        .subtitle {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.7);
            max-width: 520px;
            margin: 0 auto 40px;
            font-weight: 300;
            line-height: 1.8;
        }
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary {
            background: #C4704B;
            color: #fff;
        }
        .btn-primary:hover {
            background: #A85A3A;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196,112,75,0.4);
        }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-outline:hover {
            border-color: #C9A96E;
            color: #C9A96E;
        }

        /* ========== SCROLL INDICATOR ========== */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            animation: bounce 2s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* OPTION LABEL */
        .option-label {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(196,112,75,0.9);
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.4rem; }
            .cloud-1, .cloud-2, .cloud-4 { transform: scale(0.6); }
            .cloud-3 { transform: scale(0.5); }
            .cloud-5 { transform: scale(0.7); }
        }
    </style>
</head>
<body>
    <div class="option-label">☁️ OPCIÓN A — Cielo Onírico (CSS Puro)</div>

    <section class="hero">
        <!-- Stars -->
        <div class="stars" id="stars"></div>

        <!-- Light rays from above -->
        <div class="light-rays"></div>

        <!-- Moon glow -->
        <div class="moon-glow"></div>

        <!-- Clouds -->
        <div class="clouds-container">
            <div class="css-cloud cloud-1">
                <div class="puff"></div><div class="puff"></div><div class="puff"></div><div class="puff"></div><div class="puff"></div>
            </div>
            <div class="css-cloud cloud-2">
                <div class="puff"></div><div class="puff"></div><div class="puff"></div><div class="puff"></div>
            </div>
            <div class="css-cloud cloud-3">
                <div class="puff"></div><div class="puff"></div>
            </div>
            <div class="css-cloud cloud-4">
                <div class="puff"></div><div class="puff"></div><div class="puff"></div>
            </div>
            <div class="css-cloud cloud-5">
                <div class="puff"></div><div class="puff"></div><div class="puff"></div>
            </div>
        </div>

        <!-- Ground fog -->
        <div class="ground-fog"></div>

        <!-- Content -->
        <div class="hero-content">
            <div class="hero-badge">Cocina Fusión · Logroño</div>
            <h1>En Las <em>Nubes</em> Restobar</h1>
            <p class="subtitle">
                En pleno centro de Logroño, donde la cocina asturiana, alemana y mediterránea
                se encuentran con un ambiente único. Especialistas en cachopos.
            </p>
            <div class="buttons">
                <a href="tel:+34941578451" class="btn btn-primary">📞 Reservar Mesa</a>
                <a href="#" class="btn btn-outline">Ver Carta</a>
            </div>
        </div>

        <div class="scroll-hint">
            Descubre más<br>↓
        </div>
    </section>

    <script>
        // Generate stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 60}%;
                width: ${Math.random() * 2 + 1}px;
                height: ${Math.random() * 2 + 1}px;
                --dur: ${Math.random() * 3 + 2}s;
                animation-delay: ${Math.random() * 3}s;
            `;
            starsEl.appendChild(star);
        }
    </script>
</body>
</html>
