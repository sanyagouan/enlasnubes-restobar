<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>En Las Nubes Hero</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1c40}
#hero{position:relative;width:100%;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
#c{position:absolute;inset:0;width:100%;height:100%}
#hero::after{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,0) 45%,rgba(4,10,30,.65) 100%)}
.w{position:relative;z-index:2;text-align:center;color:#fff;padding:0 1.5rem}
.e{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(.68rem,1.3vw,.9rem);letter-spacing:.42em;text-transform:uppercase;color:rgba(205,222,255,.80);margin-bottom:1.2rem;text-shadow:0 1px 20px rgba(0,0,0,.6)}
.t{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(3.5rem,9vw,8rem);font-weight:300;line-height:1.0;letter-spacing:.04em;margin-bottom:1.1rem;text-shadow:0 2px 40px rgba(0,0,0,.5)}
.t em{display:block;font-style:italic;color:rgba(222,234,255,.95)}
.s{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(.88rem,1.7vw,1.2rem);font-weight:300;letter-spacing:.12em;color:rgba(192,212,255,.72);margin-bottom:2.8rem;text-shadow:0 1px 18px rgba(0,0,0,.5)}
.b{display:inline-block;padding:1rem 3rem;border:1px solid rgba(182,208,255,.48);color:rgba(212,230,255,1);font-family:'Cormorant Garamond',Georgia,serif;font-size:.86rem;letter-spacing:.28em;text-transform:uppercase;text-decoration:none;backdrop-filter:blur(8px);background:rgba(8,16,50,.20);border-radius:2px;transition:background .35s,border-color .35s;cursor:pointer}
.b:hover{background:rgba(55,95,210,.18);border-color:rgba(182,208,255,.85)}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
</head>
<body>
<section id="hero">
 <canvas id="c"></canvas>
 <div class="w">
 <p class="e">Cocina Fusión &middot; Logroño</p>
 <h1 class="t">En Las<br><em>Nubes</em></h1>
 <p class="s">Asturiana &middot; Alemana &middot; Mediterránea</p>
 <a class="b" href="#">Reservar Mesa</a>
 </div>
</section>
<script>
/* ═══════════════════════════════════════════════════════════════
 CLOUD HERO — Worley + FBM Noise Texture · WebGL

 Worley noise = masas redondeadas de nube (forma de cúmulo real)
 FBM = detalle rugoso en bordes (textura algodonosa)
 Blend 60/40 = nubes con forma real + bordes detallados
 ═══════════════════════════════════════════════════════════════ */

/* ─── 1. GENERACIÓN DE TEXTURA WORLEY + FBM en JavaScript ─── */
function genCloudTex(sz) {
 let seed = 98765;
 function rng() {
 seed = Math.imul(seed ^ seed >>> 13, seed | 1);
 seed ^= seed >>> 7;
 return (seed >>> 0) / 0xFFFFFFFF;
 }

 /* Puntos de Worley — múltiples a distintas escalas */
 function makePoints(n, scale) {
 return Array.from({length: n}, () => [rng() * sz * scale, rng() * sz * scale]);
 }
 const pts1 = makePoints(10, 1); // escala base — nubes más grandes y espaciadas
 const pts2 = makePoints(24, 1); // escala media — puffs secundarios

 /* Worley tileable: distancia mínima al punto más cercano */
 function worley(x, y, pts, radius) {
 let d1 = 1e9;
 for (const [px, py] of pts) {
 for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
 const wx = px + dx * sz, wy = py + dy * sz;
 const d = Math.sqrt((x-wx)*(x-wx) + (y-wy)*(y-wy));
 if (d < d1) d1 = d;
 }
 }
 /* Invertido y suavizado: 1 = centro del puff (nube densa) */
 const norm = Math.max(0, 1 - d1 / radius);
 return norm * norm; /* cuadrado = perfil más redondo/nítido */
 }

 /* Value noise + FBM para detalle de bordes */
 function hash(ix, iy) {
 let n = Math.imul(ix * 374761393 + iy * 668265263, 1013904223);
 n ^= n >>> 13; n = Math.imul(n, 1664525) + 1013904223;
 return ((n ^ n >>> 14) >>> 0) / 0xFFFFFFFF;
 }
 function vn(x, y) {
 const ix = Math.floor(x), iy = Math.floor(y);
 let fx = x-ix, fy = y-iy;
 fx = fx*fx*(3-2*fx); fy = fy*fy*(3-2*fy);
 const a=hash(ix,iy), b=hash(ix+1,iy), c=hash(ix,iy+1), d=hash(ix+1,iy+1);
 return a+(b-a)*fx+(c-a)*fy+(a-b-c+d)*fx*fy;
 }
 function fbm(x, y) {
 let v=0, amp=0.5, ox=x, oy=y;
 for (let i=0; i<5; i++) {
 v += vn(ox, oy) * amp;
 const nx = (ox-oy)*1.414*1.002 + 3.71;
 const ny = (ox+oy)*1.414*1.002 + 1.93;
 ox = nx*2.01; oy = ny*2.01; amp *= 0.5;
 }
 return v;
 }

 /* Generar y normalizar */
 const raw = new Float32Array(sz * sz);
 let mn = 1e9, mx = -1e9;
 const r1 = sz * 0.22; /* radio Worley grande */
 const r2 = sz * 0.10; /* radio Worley pequeño */

 for (let y = 0; y < sz; y++) {
 for (let x = 0; x < sz; x++) {
 const w1 = worley(x, y, pts1, r1);
 const w2 = worley(x, y, pts2, r2) * 0.5;
 const f = fbm(x/sz*5, y/sz*5);
 /* Blend: Worley domina la forma, FBM añade detalle algodonoso */
 const v = w1*0.52 + w2*0.18 + f*0.30;
 raw[y*sz+x] = v;
 if (v < mn) mn = v; if (v > mx) mx = v;
 }
 }

 const data = new Uint8Array(sz * sz);
 const range = mx - mn;
 for (let i = 0; i < sz*sz; i++)
 data[i] = Math.round(Math.max(0, Math.min(1, (raw[i]-mn)/range)) * 255);
 return data;
}

/* ─── 2. WEBGL ─── */
const cv = document.getElementById('c');
const hero = document.getElementById('hero');
const gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');

if (!gl) {
 hero.style.background = 'linear-gradient(160deg,#0d2055,#2a5fa8,#a0c8f0)';
} else {

const VS = `attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
const FS = `precision mediump float;
uniform float T;
uniform vec2 R;
uniform vec2 M;
uniform sampler2D N; /* textura Worley+FBM */

/* FBM sobre textura normalizada — 4 octavas (Worley ya tiene estructura propia) */
float fbmT(vec2 uv){
 float v=0.,a=.5;
 for(int i=0;i<4;i++){
 v+=texture2D(N,uv).r*a;
 uv=uv*2.01+vec2(.37,.71);
 a*=.5;
 }
 return v;
}

/* Densidad de nube con deriva + warp pequeño */
float density(vec2 uv, float spd){
 vec2 d=uv+vec2(T*spd,0.);
 float wx=texture2D(N,d*.35+vec2(.13,.07)).r-.5;
 float wy=texture2D(N,d*.35+vec2(.63,.51)).r-.5;
 return fbmT(d+vec2(wx,wy)*.20);
}

/* Cielo: azul marino oscuro arriba, celeste en horizonte */
vec3 sky(float y){
 vec3 top=vec3(.04,.13,.46);
 vec3 mid=vec3(.16,.42,.80);
 vec3 hor=vec3(.52,.74,.95);
 return mix(hor,mix(mid,top,smoothstep(0.,.58,y)),smoothstep(0.,.16,y));
}

/* Sol */
vec3 addSun(vec3 c,vec2 uv){
 vec2 sp=vec2(.78,.87);float d=length(uv-sp);
 c+=vec3(1.,.97,.84)*(1.-smoothstep(.019,.024,d));
 c+=vec3(1.,.90,.68)*exp(-d*8.)*.55;
 c+=vec3(1.,.86,.60)*exp(-d*3.8)*.18;
 return c;
}

/* Capa de nube con iluminación volumétrica 2D:
 - base plana (corte horizontal abrupto en bandLo)
 - cima iluminada por el sol (blanco brillante arriba)
 - base en sombra (gris-azul abajo)
 - bordes suaves pero nítidos (transición 0.10, no 0.18) */
vec3 cloudLayer(vec3 col, vec2 uv,
 float xs, float ys, float yoff, float spd,
 float bandLo, float bandHi, float str) {

 vec2 p = vec2(uv.x*xs, (uv.y-yoff)*ys);
 float dens = density(p, spd);

 /* Umbral calibrado para Worley+FBM:
 mean ~0.52, así que threshold 0.50 da ~40% cobertura */
 float c = smoothstep(.48,.60, dens); /* transición estrecha = bordes definidos */

 /* BASE PLANA: corte horizontal rápido — simula nivel de condensación real */
 float flatBase = smoothstep(bandLo, bandLo+.035, uv.y);
 c *= flatBase;

 /* Máscara superior suave */
 c *= smoothstep(bandHi, bandHi-.06, uv.y);

 if(c < .005) return col;

 /* ILUMINACIÓN VOLUMÉTRICA:
 Dentro de la banda: 0=base, 1=cima
 Base = gris-azulado (sombra del sol)
 Cima = blanco brillante (iluminación directa) */
 float relY = clamp((uv.y - bandLo) / (bandHi - bandLo), 0., 1.);
 float topLight = smoothstep(0., .5, relY) * .35 + .65; /* +35% luz arriba */
 float baseDark = (1. - smoothstep(0., .18, relY)) * .28; /* -28% oscuro abajo */

 /* Interior del cúmulo: más denso = más blanco brillante */
 float interior = smoothstep(.50, .75, dens) * .22;

 vec3 cShadow = vec3(.62,.70,.88); /* gris-azulado: sombra base cúmulo */
 vec3 cBright = vec3(1.,1.,.98); /* blanco ligeramente cálido: cima */

 float litFactor = topLight + interior - baseDark;
 vec3 cc = mix(cShadow, cBright, clamp(litFactor,.0,1.));

 /* Boost de saturación en el borde (efecto silvery-lining) */
 cc = mix(cc, vec3(1.,1.,1.), pow(c,.40)*.12);

 return mix(col, cc, c * str);
}

void main(){
 vec2 uv = gl_FragCoord.xy/R + M*.012;

 vec3 col = sky(uv.y);
 col = addSun(col, uv);

 /* ESTRATOS — de más lejano a más cercano:
 xs*ys determinan tamaño visual: xs bajo + ys bajo = nubes grandes */

 /* Capa alta: cirrocúmulos lejanos */
 col = cloudLayer(col,uv, 1.6,2.8,.62, .005, .63,.93, .60);

 /* Capa media: cúmulos protagonistas — MÁS GRANDES */
 col = cloudLayer(col,uv, 0.9,1.4,.34, .009, .36,.70, .90);

 /* Capa frontal: grandes cúmulos cercanos — MÁS GRANDES */
 col = cloudLayer(col,uv, 0.65,1.0,.08, .014, .16,.46, .98);

 /* Bruma horizonte */
 col = mix(col, vec3(.58,.78,.96), smoothstep(.20,0.,uv.y)*.28);

 /* Tone mapping Reinhard suave + gamma 2.2 */
 col = col/(col+vec3(.72));
 col = pow(clamp(col,0.,1.),vec3(.4545));
 gl_FragColor = vec4(col,1.);
}`;

/* Compilar shaders */
function mkS(t,s){
 const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);
 if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){
 console.error(gl.getShaderInfoLog(sh));return null;
 }
 return sh;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkS(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){
 console.error(gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

/* Quad */
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const ap=gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);

/* Generar textura Worley+FBM */
const SZ = 256;
console.time('genTex');
const noiseData = genCloudTex(SZ);
console.timeEnd('genTex');

const tex=gl.createTexture();
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,SZ,SZ,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,noiseData);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.generateMipmap(gl.TEXTURE_2D);

const uT=gl.getUniformLocation(prog,'T');
const uR=gl.getUniformLocation(prog,'R');
const uM=gl.getUniformLocation(prog,'M');
gl.uniform1i(gl.getUniformLocation(prog,'N'),0);

function resize(){
 cv.width=hero.clientWidth;cv.height=hero.clientHeight;
 gl.viewport(0,0,cv.width,cv.height);
 gl.uniform2f(uR,cv.width,cv.height);
}
resize();new ResizeObserver(resize).observe(hero);

let mx=0,my=0,sx=0,sy=0;
document.addEventListener('mousemove',e=>{
 mx=e.clientX/innerWidth-.5;my=e.clientY/innerHeight-.5;
});
document.addEventListener('touchmove',e=>{
 mx=e.touches[0].clientX/innerWidth-.5;
 my=e.touches[0].clientY/innerHeight-.5;
},{passive:true});

function loop(ts){
 requestAnimationFrame(loop);
 sx+=(mx-sx)*.04;sy+=(my-sy)*.04;
 gl.uniform1f(uT,ts*.001);
 gl.uniform2f(uM,sx,-sy);
 gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
requestAnimationFrame(loop);
}
</script>
</body>
</html>
